      to luxury medipens, but are safe for slimeperson crew (albeit ONLY for them).
      They're purple instead of blue, to avoid confusion.
  - bugfix: Syndicate comms now actually works.
  - rscadd: Adds "chasm filler capsules", which can be bought by miners, and thrown
      into a chasm to fill it with thick dirt. The dirt has some slowdown when walked
      over, tho.
