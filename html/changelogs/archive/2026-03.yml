2026-03-29:
  Absolucy, Siro:
  - bugfix: Reviving slimepeople cores should now be far more reliable.
  - rscadd: Slimepeople cores now store their items in them when they die.
  - rscadd: You can either use the core in-hand to take all the items out and disable
      the GPS signal, or double-examine it to see what individual items a core contains,
      and fetch them from the core.
  - rscadd: Added an ability for dead slimepeople, "Membrane Murmur", allowing them
      to vocalize a short-range cry for help from their core every so often.
  - qol: Slimepeople that are special revived not in a nugget state will reequip their
      items automatically.
  - balance: Water vapor now affects slimepeople. Starting at 1kPa partial pressure
      it will do lung and blood damage. Max damage occurs at 8kPa. Hydrophobia does
      not protect against this.
  - qol: Slime Washing now eats grime off the floor when moving, not just every second.
  - qol: Slime Washing now works if the user is lying down, even if they have shoes
      on.
  - qol: Slimepeople now have their core signal on by default.
  - bugfix: Fixed the GPS name of slimepeople core being "Unknown's Core" sometimes.
  - balance: Slimepeople can no longer catch on fire... since, well, you can't really
      fire extinguish them, can you?
  - balance: Slimepeople now need less oxygen to breathe. They still need SOME, and
      they still need pressure, but like, they need slightly less.
  - qol: Trying to pour plasma on a DNR slime core will just tell you that their soul
      has departed.
  - balance: Basic mask filters can prevent breathing in of water vapor.
  - bugfix: Rescue hooks can now fish up slime cores.
  - balance: Water exposure, i.e fire extinguishers, is now bad for slimepeople. This
      can be mitigated with thick clothing (such as modsuits), or the Hydrophobia
      ability (at the cost of notable slowdown)
  - admin: Added a "Heal Slime Core" verb for admins.
  - balance: Slimepeople can no longer regenerate limbs if they have Hydrophobia active
      - turn off Hydrophobia to regenerate your limbs!
