2026-03-23:
  00-Steven, Ephemeralis, carpotoxin:
  - rscadd: Every PDA now starts with the NTNRC chat client, including borgs and AIs!
  - rscadd: 'The NTNRC chat client has a new common #general channel, which every
      crewmember gets added to upon joining the station.'
  - rscadd: A new NTNRC username preference has been added to the names menu. Your
      NTNRC username is automatically set to this value.
  - qol: Opening the NTNRC chat client will auto-open the common channel, if you haven't
      left it.
  - qol: NTNRC messages from your active chat channel now show up in the chat window
      if your PDA is active and on your person.
  - rscadd: The IRC keybind has been added (defaults to Shift-;), which lets you send
      a message to your active NTNRC channel quickly so long as your PDA is in your
      hands, on your belt, or in your ID slot. This also works for silicons without
      those restrictions.
  - rscadd: The station AI gets their own NTNRC chat-room to moderate.
  Absolucy:
  - balance: Unreadied players now count as half a player for roundstart dynamic calculations.
  - rscadd: You can now wear pet collars.
  - rscadd: Added pet collars as a loadout option.
  - qol: Changing your body size with Alter Form will now quickly transition your
      size smaller or larger, instead of just abruptly instantly resizing you.
  - bugfix: Midround traitor (syndicate sleeper agent) prompting should actually work
      now.
  - bugfix: Eye emissive sprites are now properly aligned on characters with different
      heights.
